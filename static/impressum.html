<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum — MyCasino</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #f0f0f0;
      text-decoration: none;
    }
    .logo span { color: #f0c040; }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    nav a:hover { color: #f0c040; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 1.5rem 4rem;
    }

    h1 {
      color: #f0c040;
      font-size: 1.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #f0c040;
      border-radius: 1px;
      margin: 1.2rem 0 2.5rem;
      opacity: 0.5;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2.2rem 2.5rem;
      max-width: 520px;
      width: 100%;
    }

    .notice {
      background: #1a1500;
      border: 1px solid #f0c04033;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #f0c040;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .row:last-child { border-bottom: none; }

    .row .label {
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .row .value {
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .row .value a {
      color: #f0c040;
      text-decoration: none;
    }
    .row .value a:hover { text-decoration: underline; }

    /* ── Footer ── */
    footer {
      background: #111;
      border-top: 1px solid #1e1e1e;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
    }

    .footer-logo {
      font-weight: 800;
      font-size: 1rem;
      color: #f0f0f0;
      letter-spacing: 1px;
    }
    .footer-logo span { color: #f0c040; }

    .footer-note {
      color: #444;
      font-size: 0.75rem;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.2rem;
    }
    .footer-links a {
      color: #555;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: #f0c040; }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/static/index.html">🃏 My<span>Casino</span></a>
    <nav>
      <a href="/static/index.html">Home</a>
      <a href="/static/history.html">History</a>
    </nav>
  </header>

  <main>
    <h1>Impressum</h1>
    <div class="divider"></div>

    <div class="card">
      <div class="notice">
        ℹ️ Dies ist ein privates Lernprojekt. Keine echten Geldspiele.
      </div>

      <div class="row">
        <span class="label">Betreiber</span>
        <span class="value">Finn</span>
      </div>
      <div class="row">
        <span class="label">Land</span>
        <span class="value">Deutschland</span>
      </div>
      <div class="row">
        <span class="label">Kontakt</span>
        <span class="value"><a href="mailto:finnjebon@gmail.com">finnjebon@gmail.com</a></span>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">🃏 My<span>Casino</span></div>
    <span class="footer-note">Personal project &mdash; fake credits only, no real money</span>
    <div class="footer-links">
      <a href="/static/history.html">History</a>
      <a href="/static/impressum.html">Impressum</a>
      <a href="#">GitHub</a>
    </div>
  </footer>

</body>
</html>
