<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCasino</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script src="/static/navbar.js"></script>

  <!-- ── Hero ── -->
  <section class="hero">
    <p class="hero-eyebrow">Welcome to</p>
    <h1>Buzz<br /><em>Casino</em></h1>
    <p>Pick a game and test your luck. All credits are virtual — the fun is real.</p>
  </section>

  <!-- ── Game Grid ── -->
  <main class="games" id="games">
    <div class="section-header">
      <h2>Games</h2>
      <span>7 available</span>
    </div>

    <div class="games-grid" id="games-grid"></div>
  </main>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Daily Bonus Popup ── -->
  <div class="daily-overlay" id="dailyOverlay">
    <div class="daily-popup" id="dailyPopup">
      <button class="daily-close" id="dailyClose" aria-label="Schließen">✕</button>
      <div class="daily-body" id="dailyBody">
        <div class="daily-title">Täglicher Bonus</div>
        <div class="daily-gift" id="dailyGift">🎁</div>
        <div class="daily-hint">Klicke auf die Geschenkbox!</div>
      </div>
      <div class="daily-coins" id="dailyCoins"></div>
      <div class="daily-result" id="dailyResult"></div>
    </div>
  </div>

  <!-- ── Daily Bonus Countdown (when already claimed) ── -->
  <div class="daily-banner" id="dailyBanner" style="display:none">
    <span>🎁</span>
    <span>Nächster Bonus in <strong id="dailyCountdown"></strong></span>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-logo">🃏 My<span>Casino</span></div>
    <span class="footer-note">Personal project &mdash; fake credits only, no real money</span>
    <div class="footer-links">
      <a href="/static/history.html">History</a>
      <a href="/static/impressum.html">About</a>
      <a href="#">GitHub</a>
    </div>
  </footer>

  <style>
    /* ── Daily Bonus Overlay ── */
    .daily-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .daily-overlay.show { opacity: 1; pointer-events: all; }

    .daily-popup {
      position: relative;
      background: var(--surface);
      border: 1.5px solid var(--gold-dim);
      border-radius: 18px;
      padding: 2.2rem 2.5rem 2rem;
      min-width: 300px; max-width: 360px;
      text-align: center;
      box-shadow: 0 0 48px rgba(201,149,42,0.25), 0 8px 40px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .daily-close {
      position: absolute; top: 0.9rem; right: 1.1rem;
      background: none; border: none;
      color: var(--muted); font-size: 1.1rem;
      cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .daily-close:hover { color: var(--text); }

    .daily-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }

    .daily-gift {
      font-size: 4.5rem; cursor: pointer;
      display: inline-block;
      transition: transform 0.15s;
      user-select: none;
    }
    .daily-gift:hover { transform: scale(1.12); }
    .daily-gift.clicked { animation: giftPop 0.35s ease; }

    @keyframes giftPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.28); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    .daily-hint {
      margin-top: 0.9rem;
      color: var(--muted); font-size: 0.88rem;
    }

    /* ── Coin burst ── */
    .daily-coins { position: absolute; inset: 0; pointer-events: none; }

    .coin {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f5d87a, #c9952a);
      box-shadow: 0 0 6px rgba(201,149,42,0.8);
      animation: coinFly var(--dur, 0.9s) ease-out forwards;
      left: var(--x, 50%);
      top: var(--y, 50%);
    }

    @keyframes coinFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.5); opacity: 0; }
    }

    /* ── Result text ── */
    .daily-result {
      font-size: 1.25rem; font-weight: 700;
      color: var(--gold-light);
      min-height: 2rem;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 0.4s 0.5s;
    }
    .daily-result.show { opacity: 1; }

    /* ── Daily banner (next bonus countdown) ── */
    .daily-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1.2rem;
      margin: 0.8rem auto 0;
      max-width: 340px;
      display: flex; align-items: center; gap: 0.6rem;
      color: var(--muted); font-size: 0.9rem;
    }
    .daily-banner strong { color: var(--gold-light); }
  </style>

  <script>
    const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? "http://127.0.0.1:8000"
      : "https://finndev.me";

    const GAMES = [
      {
        icon: '🃏',
        name: 'Blackjack',
        desc: 'Beat the dealer to 21 without going bust.',
        tag: 'Card game',
        requiredLevel:1
      },
      {
        icon: '🎡',
        name: 'Roulette',
        desc: 'Place your bets and spin the wheel.',
        tag: 'Table game',
        requiredLevel:8
      },
      {
        icon: '🎰',
        name: 'Slot Machine',
        desc: 'Line up the symbols and hit the jackpot.',
        tag: 'Slots',
        requiredLevel:2
      },
      {
        icon: '🎲',
        name: 'Dice',
        desc: 'Roll the dice and bet on the outcome.',
        tag: 'Dice game',
        requiredLevel:1
      },
      {
        icon: '🂡',
        name: 'Poker',
        desc: "Build the best hand and outwit the table.",
        tag: 'Card game',
        requiredLevel:9
      },
      {
        icon: '🐔',
        name: 'Chicken Road',
        desc: 'Überquere die Straße — cash out bevor das Auto kommt!',
        tag: 'Arcade',
        requiredLevel:4
      },
      {
        icon: '💣',
        name: 'Mines',
        desc: 'Decke sichere Felder auf und cash out bevor du eine Bombe triffst!',
        tag: 'Arcade',
        requiredLevel:6
      },
    ];

    // Render game cards
    const savedUsername = localStorage.getItem("username");
    if (!savedUsername || savedUsername === "undefined") {
        window.location.href = "/static/login.html";
    }

    const grid = document.getElementById('games-grid');
    const level = parseInt(localStorage.getItem("level")) || 0;

    GAMES.forEach(game => {
      const locked = game.requiredLevel > level;
      const card = document.createElement('article');
      card.className = 'card' + (locked ? ' card--locked' : '');
      card.innerHTML = `
        <span class="card-icon">${game.icon}</span>
        <div class="card-name">${game.name}</div>
        <div class="card-desc">${game.desc}</div>
        <span class="card-tag">${game.tag}</span>
        <button class="btn-play" data-game="${game.name}">
          ${locked ? `🔒 Level ${game.requiredLevel}` : 'Play'}
        </button>
      `;
      grid.appendChild(card);
    });

    // Toast helper
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Play button handler
    document.getElementById('games-grid').addEventListener('click', e => {
      const btn = e.target.closest('.btn-play');
      if (!btn) return;

      const game = GAMES.find(g => g.name === btn.dataset.game);

      if (game && game.requiredLevel > level) {
          showToast(`Erreiche Level ${game.requiredLevel} um dieses Spiel freizuschalten!`);
          return;
      }

      if (btn.dataset.game == "Slot Machine") {
          window.location.href = "/static/slots.html";
          return;
      }
      if (btn.dataset.game == "Dice") {
          window.location.href = "/static/dice.html";
          return;
      }
      if (btn.dataset.game == "Blackjack") {
          window.location.href = "/static/blackjack.html";
          return;
      }
      if (btn.dataset.game == "Chicken Road") {
          window.location.href = "/static/chicken.html";
          return;
      }
      if (btn.dataset.game == "Mines") {
          window.location.href = "/static/mines.html";
          return;
      }
      if (btn.dataset.game == "Roulette") {
          window.location.href = "/static/roulette.html";
          return;
      }
      showToast(`${btn.dataset.game} — Coming soon!`);
    });

    // ── Daily Bonus ──────────────────────────────────────────────
    const dailyOverlay = document.getElementById('dailyOverlay');
    const dailyClose   = document.getElementById('dailyClose');
    const dailyGift    = document.getElementById('dailyGift');
    const dailyCoins   = document.getElementById('dailyCoins');
    const dailyResult  = document.getElementById('dailyResult');
    const dailyHint    = document.querySelector('.daily-hint');
    const dailyBanner  = document.getElementById('dailyBanner');
    const dailyCountdown = document.getElementById('dailyCountdown');

    let countdownInterval = null;

    function openDailyPopup() {
      dailyOverlay.classList.add('show');
    }

    function closeDailyPopup() {
      dailyOverlay.classList.remove('show');
    }

    dailyClose.addEventListener('click', closeDailyPopup);
    dailyOverlay.addEventListener('click', e => {
      if (e.target === dailyOverlay) closeDailyPopup();
    });

    function spawnCoins() {
      dailyCoins.innerHTML = '';
      const rect = dailyGift.getBoundingClientRect();
      const popupRect = document.getElementById('dailyPopup').getBoundingClientRect();
      const cx = rect.left - popupRect.left + rect.width / 2;
      const cy = rect.top  - popupRect.top  + rect.height / 2;
      const count = 18;
      for (let i = 0; i < count; i++) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        const angle = (360 / count) * i + Math.random() * 20 - 10;
        const dist  = 70 + Math.random() * 60;
        const rad   = angle * Math.PI / 180;
        const tx    = Math.cos(rad) * dist;
        const ty    = Math.sin(rad) * dist - 40;
        coin.style.cssText = `--x:${cx}px; --y:${cy}px; --tx:${tx}px; --ty:${ty}px; --dur:${0.7 + Math.random()*0.4}s`;
        dailyCoins.appendChild(coin);
      }
    }

    function startCountdown(seconds) {
      function fmt(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      }
      dailyBanner.style.display = 'flex';
      dailyCountdown.textContent = fmt(seconds);
      countdownInterval = setInterval(() => {
        seconds -= 1;
        if (seconds <= 0) { clearInterval(countdownInterval); dailyBanner.style.display = 'none'; return; }
        dailyCountdown.textContent = fmt(seconds);
      }, 1000);
    }

    async function claimDailyBonus() {
      dailyGift.classList.add('clicked');
      dailyGift.style.pointerEvents = 'none';
      dailyHint.textContent = '';
      setTimeout(() => dailyGift.classList.remove('clicked'), 350);
      spawnCoins();
      try {
        const res = await fetch(`${API_URL}/daily_spin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: savedUsername })
        });
        const data = await res.json();
        if (data.reward !== undefined) {
          dailyResult.textContent = `Du hast ${data.reward} Gold gewonnen! 🎉`;
          dailyResult.classList.add('show');
          if (data.new_balance !== undefined) {
            localStorage.setItem('balance', data.new_balance);
          }
          setTimeout(closeDailyPopup, 3000);
          startCountdown(24 * 3600);
        } else {
          dailyResult.textContent = data.error || 'Fehler beim Einlösen.';
          dailyResult.classList.add('show');
        }
      } catch {
        dailyResult.textContent = 'Verbindungsfehler.';
        dailyResult.classList.add('show');
      }
    }

    dailyGift.addEventListener('click', claimDailyBonus);

    function checkDailyStatus() {
      const canSpin = localStorage.getItem("can_spin");
      if (canSpin === "true") {
        localStorage.removeItem("can_spin");
        localStorage.removeItem("daily_remaining");
        openDailyPopup();
      } else if (canSpin === "false") {
        localStorage.removeItem("can_spin");
        const remaining = parseInt(localStorage.getItem("daily_remaining")) || 0;
        localStorage.removeItem("daily_remaining");
        if (remaining > 0) startCountdown(remaining);
      }
    }

    checkDailyStatus();
    window.checkDailyStatus = checkDailyStatus;
  </script>
  <script src="/static/murmel.js"></script>
</body>
</html>
