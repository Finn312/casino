<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop – BuzzCasino</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .shop-wrap {
      max-width: 560px;
      margin: 3rem auto;
      padding: 0 1rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .shop-title {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.03em;
    }
    .shop-title span { color: var(--text); }

    .shop-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .shop-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .shop-card-sub {
      font-size: 0.83rem;
      color: var(--muted);
      margin-top: -0.5rem;
    }

    .shop-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .shop-field label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .shop-input {
      background: #111118;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .shop-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    .shop-input::placeholder { color: #44444f; }

    .shop-btn {
      background: var(--gold);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-start;
      font-family: inherit;
    }
    .shop-btn:hover { background: var(--gold-light); }
    .shop-btn:active { transform: scale(0.97); }
    .shop-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .shop-msg {
      font-size: 0.88rem;
      padding: 0.6rem 0.85rem;
      border-radius: var(--radius);
      display: none;
    }
    .shop-msg.success {
      display: block;
      background: rgba(80, 200, 120, 0.12);
      border: 1px solid rgba(80, 200, 120, 0.3);
      color: #6ee79a;
    }
    .shop-msg.error {
      display: block;
      background: rgba(220, 80, 80, 0.12);
      border: 1px solid rgba(220, 80, 80, 0.3);
      color: #f07070;
    }

    .code-display {
      background: #111118;
      border: 1.5px dashed var(--gold-dim);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--gold-light);
      text-align: center;
      display: none;
      user-select: all;
    }
    .code-display.show { display: block; }

    .code-meta {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      display: none;
    }
    .code-meta.show { display: block; }

    #admin-section { display: none; }
    #admin-section.visible { display: flex; }
  </style>
</head>
<body>
  <script src="/static/navbar.js"></script>

  <div class="shop-wrap">
    <h1 class="shop-title">🎟 <span>Buzz</span>Casino Shop</h1>

    <!-- ── Code einlösen ── -->
    <div class="shop-card">
      <div class="shop-card-title">🎁 Code einlösen</div>
      <p class="shop-card-sub">Gib deinen Gutschein-Code ein, um Coins zu erhalten.</p>

      <div class="shop-field">
        <label for="redeem-input">Code</label>
        <input
          id="redeem-input"
          class="shop-input"
          type="text"
          placeholder="z.B. A1B2C3D4"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button class="shop-btn" id="redeem-btn">Einlösen</button>
      <div class="shop-msg" id="redeem-msg"></div>
    </div>

    <!-- ── Admin: Code erstellen ── -->
    <div class="shop-card" id="admin-section" style="border-color: #3a2a10;">
      <div class="shop-card-title">🔐 Admin – Code erstellen</div>
      <p class="shop-card-sub">Erstelle einen neuen Coin-Code mit einem bestimmten Wert.</p>

      <div class="shop-field">
        <label for="admin-amount">Coin-Wert</label>
        <input
          id="admin-amount"
          class="shop-input"
          type="number"
          min="1"
          placeholder="z.B. 1000"
        />
      </div>

      <div class="shop-field">
        <label for="admin-password">Admin-Passwort</label>
        <input
          id="admin-password"
          class="shop-input"
          type="password"
          placeholder="Dein Passwort"
          autocomplete="current-password"
        />
      </div>

      <button class="shop-btn" id="admin-btn">Code generieren</button>
      <div class="shop-msg" id="admin-msg"></div>
      <div class="code-display" id="generated-code"></div>
      <div class="code-meta" id="code-meta"></div>
    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8000'
      : 'https://finndev.me';

    const username = localStorage.getItem('username');
    if (!username || username === 'undefined') {
      window.location.href = '/static/login.html';
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = 'shop-msg ' + type;
    }

    // ── Check admin status ──
    fetch(`${API_URL}/get_balance?username=${encodeURIComponent(username)}`)
      .then(r => r.json())
      .then(data => {
        if (data.is_admin) {
          document.getElementById('admin-section').classList.add('visible');
          document.getElementById('admin-section').style.display = 'flex';
        }
      })
      .catch(() => {});

    // ── Code einlösen ──
    document.getElementById('redeem-btn').addEventListener('click', async () => {
      const code = document.getElementById('redeem-input').value.trim();
      const msgEl = document.getElementById('redeem-msg');
      const btn = document.getElementById('redeem-btn');

      if (!code) {
        showMsg(msgEl, 'Bitte einen Code eingeben.', 'error');
        return;
      }

      btn.disabled = true;
      try {
        const res = await fetch(`${API_URL}/redeem_code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, code }),
        });
        const data = await res.json();
        if (data.error) {
          showMsg(msgEl, data.error, 'error');
        } else {
          showMsg(msgEl, `${data.message} – Neues Guthaben: ${Number(data.new_balance).toLocaleString('de-DE')} Coins`, 'success');
          document.getElementById('redeem-input').value = '';
          if (data.new_balance !== undefined && window.updateDisplay) {
            const lvl  = parseInt(localStorage.getItem('level') || '0', 10);
            const gold = parseInt(localStorage.getItem('total_gold_earned') || '0', 10);
            window.updateDisplay(data.new_balance, lvl, gold);
          }
        }
      } catch {
        showMsg(msgEl, 'Verbindungsfehler. Bitte erneut versuchen.', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('redeem-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('redeem-btn').click();
    });

    // ── Admin: Code erstellen ──
    document.getElementById('admin-btn').addEventListener('click', async () => {
      const amount   = parseInt(document.getElementById('admin-amount').value, 10);
      const password = document.getElementById('admin-password').value;
      const msgEl    = document.getElementById('admin-msg');
      const btn      = document.getElementById('admin-btn');
      const codeEl   = document.getElementById('generated-code');
      const metaEl   = document.getElementById('code-meta');

      if (!amount || amount < 1) {
        showMsg(msgEl, 'Bitte eine gültige Coin-Anzahl eingeben.', 'error');
        return;
      }
      if (!password) {
        showMsg(msgEl, 'Bitte das Admin-Passwort eingeben.', 'error');
        return;
      }

      btn.disabled = true;
      codeEl.classList.remove('show');
      metaEl.classList.remove('show');

      try {
        const res = await fetch(`${API_URL}/admin/create_coin_code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, new_balance: amount }),
        });
        const data = await res.json();
        if (data.error) {
          showMsg(msgEl, data.error, 'error');
        } else {
          msgEl.className = 'shop-msg';
          codeEl.textContent = data.code;
          codeEl.classList.add('show');
          metaEl.textContent = `Wert: ${Number(data.value).toLocaleString('de-DE')} Coins`;
          metaEl.classList.add('show');
          document.getElementById('admin-amount').value = '';
          document.getElementById('admin-password').value = '';
        }
      } catch {
        showMsg(msgEl, 'Verbindungsfehler. Bitte erneut versuchen.', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
