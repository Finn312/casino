<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Slot Machine</title>
    <style>
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { color: #f0c040; }
        #reels {
            display: flex;
            gap: 1.5rem;
            margin: 2rem 0;
            background: #111;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 2px solid #f0c040;
        }
        .reel-container {
            width: 100px;
            height: 100px;
            overflow: hidden;
            background: #0d0d0d;
            border: 2px solid #444;
            border-radius: 10px;
            position: relative;
        }
        .reel-track {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            will-change: transform;
        }
        .reel-symbol {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
        }
        .reel-container.spinning .reel-track {
            filter: blur(3px);
        }
        .reel-container.win-glow {
            border-color: #f0c040;
            box-shadow: 0 0 20px #f0c040, 0 0 40px rgba(240, 192, 64, 0.35);
        }
        #balance, #message {
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        #message { color: #f0c040; min-height: 1.5rem; }
        select, button {
            font-size: 1rem;
            padding: 0.5rem 1rem;
            margin: 0.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        button {
            background: #f0c040;
            color: #0a0a0a;
            font-weight: bold;
        }
        button:hover { background: #d4a820; }
        a { color: #f0c040; margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>🎰 Slot Machine</h1>
    <div id="balance">Credits: 1000</div>
    <div id="reels">
        <div class="reel-container" id="reel-0"><div class="reel-track" id="track-0"></div></div>
        <div class="reel-container" id="reel-1"><div class="reel-track" id="track-1"></div></div>
        <div class="reel-container" id="reel-2"><div class="reel-track" id="track-2"></div></div>
    </div>
    <div id="message"></div>
    <div>
        <label>Einsatz:</label>
        <select id="bet">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        <button onclick="spin()">Drehen!</button>
        <button id="autoplay" onclick="autoplay()">Autoplay</button>
    </div>
    <a href="/static/index.html">← Zurück zur Lobby</a>

    <script>
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"
            : "https://casino-zzi5.onrender.com";

        const SYMBOLS = ["🍒", "🍋", "🍊", "🍇", "⭐", "💎", "7️⃣"];
        const SYMBOL_HEIGHT = 100;
        const PRE_SYMBOLS = 18;

        const _stored = localStorage.getItem("balance");
        let balance = (_stored !== null && !isNaN(parseInt(_stored))) ? parseInt(_stored) : 1000;
        let autospin_state = false;
        let isSpinning = false;
        let phase1Interval = null;

        function randomSymbol() {
            return SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        }

        function initReels() {
            document.getElementById("balance").textContent = "Credits: " + balance;
            document.querySelectorAll(".reel-container").forEach(c => {
                c.classList.remove("spinning", "win-glow");
            });
            for (let i = 0; i < 3; i++) {
                const track = document.getElementById(`track-${i}`);
                track.innerHTML = "";
                track.style.transition = "none";
                track.style.transform = "translateY(0)";
                const div = document.createElement("div");
                div.className = "reel-symbol";
                div.textContent = "🎰";
                track.appendChild(div);
            }
        }

        function startPhase1() {
            document.querySelectorAll(".reel-container").forEach(c => c.classList.add("spinning"));
            phase1Interval = setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    const sym = document.querySelector(`#track-${i} .reel-symbol`);
                    if (sym) sym.textContent = randomSymbol();
                }
            }, 75);
        }

        function stopPhase1() {
            if (phase1Interval) {
                clearInterval(phase1Interval);
                phase1Interval = null;
            }
        }

        function buildTrack(trackEl, finalSymbol) {
            trackEl.innerHTML = "";
            for (let i = 0; i < PRE_SYMBOLS; i++) {
                const div = document.createElement("div");
                div.className = "reel-symbol";
                div.textContent = randomSymbol();
                trackEl.appendChild(div);
            }
            const finalDiv = document.createElement("div");
            finalDiv.className = "reel-symbol";
            finalDiv.textContent = finalSymbol;
            trackEl.appendChild(finalDiv);
        }

        function animateReelStop(reelIndex, finalSymbol, delay, duration) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const container = document.getElementById(`reel-${reelIndex}`);
                    const track = document.getElementById(`track-${reelIndex}`);

                    buildTrack(track, finalSymbol);
                    track.style.transition = "none";
                    track.style.transform = "translateY(0)";
                    track.getBoundingClientRect(); // force reflow

                    track.style.transition = `transform ${duration}ms cubic-bezier(0.16, 1, 0.3, 1)`;
                    track.style.transform = `translateY(${-(PRE_SYMBOLS * SYMBOL_HEIGHT)}px)`;

                    setTimeout(() => {
                        container.classList.remove("spinning");
                        resolve();
                    }, duration);
                }, delay);
            });
        }

        async function autoplay() {
            autospin_state = !autospin_state;
            const btn = document.getElementById("autoplay");

            if (autospin_state) {
                btn.style.background = "red";
                btn.textContent = "Stop";

                while (autospin_state && balance >= parseInt(document.getElementById("bet").value)) {
                    await spin();
                    await new Promise(r => setTimeout(r, 1200));
                }

                btn.style.background = "#f0c040";
                btn.textContent = "Autoplay";
                autospin_state = false;
            } else {
                btn.style.background = "#f0c040";
                btn.textContent = "Autoplay";
            }
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;

            const bet = parseInt(document.getElementById("bet").value);
            document.getElementById("message").textContent = "";
            document.querySelectorAll(".reel-container").forEach(c => c.classList.remove("win-glow"));

            startPhase1();

            const fetchPromise = fetch(`${API_URL}/spin`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ bet: bet, balance: balance })
            }).then(r => r.json());

            // Wait for API + minimum visual spin time in parallel
            const [data] = await Promise.all([
                fetchPromise,
                new Promise(r => setTimeout(r, 400))
            ]);

            stopPhase1();

            if (data.error) {
                initReels();
                document.getElementById("message").textContent = data.error;
                if (autospin_state) {
                    autospin_state = false;
                    const btn = document.getElementById("autoplay");
                    btn.style.background = "#f0c040";
                    btn.textContent = "Autoplay";
                }
                isSpinning = false;
                return;
            }

            // Staggered reel stops: reel 0 → reel 1 → reel 2
            await Promise.all([
                animateReelStop(0, data.reels[0],   0, 600),
                animateReelStop(1, data.reels[1], 250, 600),
                animateReelStop(2, data.reels[2], 500, 600),
            ]);

            balance = data.balance;
            localStorage.setItem("balance", balance);
            document.getElementById("balance").textContent = "Credits: " + balance;

            if (data.win > 0) {
                const net = data.win - bet;
                document.getElementById("message").textContent = "+" + net + " Credits! 🎉";
                document.querySelectorAll(".reel-container").forEach(c => c.classList.add("win-glow"));
            } else {
                document.getElementById("message").textContent = "Kein Gewinn 😔";
            }

            isSpinning = false;
        }

        initReels();
    </script>
</body>
</html>
