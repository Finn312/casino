<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen — MyCasino</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(ellipse at 50% 25%, #0e0e0e 0%, #0a0a0a 65%);
            color: #e8e8ee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 5rem;
        }

        /* ── Page top ── */
        .page-top {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .back-link {
            position: absolute;
            left: 0; top: 2px;
            color: #555;
            font-size: 0.83rem;
            text-decoration: none;
            transition: color 0.15s;
        }
        .back-link:hover { color: #f0c040; }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0c040;
            letter-spacing: 0.04em;
            margin-bottom: 0.6rem;
        }
        .logo span { color: #e8e8ee; }

        .title-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 320px;
        }
        .title-bar .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #f0c040 60%, transparent);
            opacity: 0.35;
        }
        .title-bar h1 {
            color: #f0c040;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 520px;
            background: #111117;
            border: 1px solid #222230;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 32px rgba(0,0,0,0.55);
        }

        /* ── Section header ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #f0c040;
            margin-bottom: 1.5rem;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #f0c04044, transparent);
        }

        /* ── Setting rows ── */
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #1e1e28;
        }
        .setting-row:last-child { border-bottom: none; padding-bottom: 0; }
        .setting-row:first-of-type { padding-top: 0; }

        .setting-info { display: flex; flex-direction: column; gap: 0.25rem; }
        .setting-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e0e0ea;
        }
        .setting-desc {
            font-size: 0.78rem;
            color: #55556a;
        }

        /* ── Toggle ── */
        .toggle-wrap { flex-shrink: 0; }
        .toggle {
            position: relative;
            width: 48px; height: 26px;
            display: inline-block;
        }
        .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #2a2a38;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.25s;
            border: 1px solid #333344;
        }
        .toggle-track::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            left: 3px; top: 3px;
            background: #555566;
            border-radius: 50%;
            transition: transform 0.25s, background 0.25s;
        }
        .toggle input:checked + .toggle-track {
            background: #1a3a1a;
            border-color: #2a6a2a;
        }
        .toggle input:checked + .toggle-track::after {
            transform: translateX(22px);
            background: #4ade80;
        }

        /* ── Slider ── */
        .slider-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            min-width: 160px;
        }
        .slider-val {
            font-size: 0.82rem;
            font-weight: 700;
            color: #f0c040;
            font-variant-numeric: tabular-nums;
            min-width: 3.5rem;
            text-align: right;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #2a2a38;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #f0c040;
            box-shadow: 0 0 6px rgba(240,192,64,0.4);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 12px rgba(240,192,64,0.7);
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #f0c040;
            border: none;
            cursor: pointer;
        }

        /* ── Save button ── */
        .save-wrap {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
        }
        .save-msg {
            font-size: 0.82rem;
            color: #4ade80;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-msg.visible { opacity: 1; }
        .save-msg.error   { color: #f87171; }

        .btn-save {
            background: linear-gradient(135deg, #c89618, #f0c040);
            color: #0a0a0a;
            font-weight: 800;
            font-size: 0.9rem;
            padding: 0.65rem 1.8rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: box-shadow 0.15s, transform 0.12s;
            box-shadow: 0 3px 12px rgba(240,192,64,0.25);
        }
        .btn-save:hover { box-shadow: 0 5px 20px rgba(240,192,64,0.45); transform: translateY(-1px); }
        .btn-save:active { transform: translateY(0); }
        .btn-save:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div class="page-top">
        <a class="back-link" href="/static/index.html">← Lobby</a>
        <div class="logo">🃏 My<span>Casino</span></div>
        <div class="title-bar">
            <div class="line"></div>
            <h1>⚙️ Einstellungen</h1>
            <div class="line"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-label">🦫 Murmel</div>

        <!-- Toggle -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-name">Murmel aktivieren</span>
                <span class="setting-desc">Chat-Widget ein- oder ausblenden</span>
            </div>
            <div class="toggle-wrap">
                <label class="toggle">
                    <input type="checkbox" id="murmel-enabled" checked>
                    <span class="toggle-track"></span>
                </label>
            </div>
        </div>

        <!-- Intervall-Slider -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-name">Spruch-Intervall</span>
                <span class="setting-desc">Wie oft erscheint eine Sprechblase</span>
            </div>
            <div class="slider-wrap">
                <span class="slider-val" id="interval-val">60 s</span>
                <input type="range" id="murmel-interval" min="30" max="120" step="5" value="60">
            </div>
        </div>

        <!-- Dauer-Slider -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-name">Spruch-Dauer</span>
                <span class="setting-desc">Wie lange bleibt die Sprechblase sichtbar</span>
            </div>
            <div class="slider-wrap">
                <span class="slider-val" id="duration-val">5 s</span>
                <input type="range" id="murmel-duration" min="2" max="10" step="1" value="5">
            </div>
        </div>

        <div class="save-wrap">
            <span class="save-msg" id="save-msg"></span>
            <button class="btn-save" id="save-btn" onclick="saveSettings()">Speichern</button>
        </div>
    </div>

    <script src="/static/murmel.js"></script>
    <script>
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"
            : "https://finndev.me";

        const username = localStorage.getItem("username");
        if (!username) window.location.href = "/static/login.html";

        const enabledEl  = document.getElementById("murmel-enabled");
        const intervalEl = document.getElementById("murmel-interval");
        const durationEl = document.getElementById("murmel-duration");
        const intervalVal = document.getElementById("interval-val");
        const durationVal = document.getElementById("duration-val");
        const saveMsg    = document.getElementById("save-msg");
        const saveBtn    = document.getElementById("save-btn");

        // Live-Anzeige für Slider
        intervalEl.addEventListener("input", () => {
            intervalVal.textContent = intervalEl.value + " s";
        });
        durationEl.addEventListener("input", () => {
            durationVal.textContent = durationEl.value + " s";
        });

        // Settings laden
        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}/get_settings?username=${encodeURIComponent(username)}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (data.error) throw new Error();

                enabledEl.checked     = data.murmel_enabled  ?? true;
                intervalEl.value      = data.murmel_interval  ?? 60;
                durationEl.value      = data.murmel_duration  ?? 5;
                intervalVal.textContent = intervalEl.value + " s";
                durationVal.textContent = durationEl.value + " s";
            } catch {
                // Standardwerte bereits gesetzt
            }
        }

        // Settings speichern
        async function saveSettings() {
            saveBtn.disabled = true;
            saveMsg.className = "save-msg";
            saveMsg.textContent = "";

            try {
                const res = await fetch(`${API_URL}/update_settings`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username,
                        murmel_enabled:  enabledEl.checked,
                        murmel_interval: parseInt(intervalEl.value),
                        murmel_duration: parseInt(durationEl.value),
                    })
                });
                if (!res.ok) throw new Error();
                saveMsg.textContent = "✓ Gespeichert";
                saveMsg.className = "save-msg visible";
            } catch {
                saveMsg.textContent = "Fehler beim Speichern";
                saveMsg.className = "save-msg visible error";
            } finally {
                saveBtn.disabled = false;
                setTimeout(() => { saveMsg.className = "save-msg"; }, 2500);
            }
        }

        loadSettings();
    </script>
</body>
</html>
